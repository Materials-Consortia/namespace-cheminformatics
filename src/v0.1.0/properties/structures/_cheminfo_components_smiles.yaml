$$schema: "https://schemas.optimade.org/meta/v1.2/optimade/property_definition"
$id: "https://schemas.optimade.org/namespaces/cheminformatics/v0.1/properties/structures/_cheminfo_components_smiles"
title: "SMILES (Simplified Molecular Input Line Entry System) representations of the molecular entities of the structure"
x-optimade-type: "list"
x-optimade-definition:
  kind: "property"
  version: "0.1.0"
  format: "1.2"
  name: "_cheminfo_components_smiles"
  label: "_cheminfo_components_smiles_structures"
type:
  - "array"
  - "null"
x-optimade-dimensions:
  names: ["dim__cheminfo_components"]
description: |-
  SMILES (Simplified Molecular Input Line Entry System) representation of the molecular entities of the structure.
  Molecular entities MUST NOT overlap, i.e., any atom of a structure MUST NOT appear in more than one entity.
  There MAY be atoms participating in none of the molecular entities: providers are allowed to exclude certain entities if they wish.
  Order of the list items MUST correspond to the order in '_cheminfo_components_counts' and '_cheminfo_components_stdinchi'.

  **Explained examples**:

  - `["[Cl-]", "[Na+]"]`: NaCl (salt) broken into constituent ions.
  - `["c1ccc(c(c1)C(=O)O)O", "Cn1cnc2c1c(=O)n(C)c(=O)n2C"]`: a co-crystal of two organic compounds.
examples:
  - ["[Cl-]", "[Na+]"]
  - ["c1ccc(c(c1)C(=O)O)O", "Cn1cnc2c1c(=O)n(C)c(=O)n2C"]
x-optimade-metadata-definition:
  title: "Metadata for the _cheminfo_components_smiles field"
  description: "This dictionary contains the per-entry metadata for the _cheminfo_components_smiles field."
  x-optimade-type: "dictionary"
  type:
    - "object"
    - "null"
  properties:
    _cheminfo_specification_name:
      description: |-
        A name of the specification the given SMILES string conforms to.
        Takes value from an enumeration set containing 'IUPAC SMILES+' (https://github.com/IUPAC/IUPAC_SMILES_plus), 'OpenSMILES' (http://opensmiles.org/opensmiles.html) and 'other' (none of the above).
        If 'other' is chosen, the specification MUST be specified in metadata property '_cheminfo_specification_name_other'.
        'null' value means that the specification of the given SMILES string is not known.
      x-optimade-type: "string"
      type:
        - "string"
        - "null"
      enum:
        - "IUPAC SMILES+"
        - "OpenSMILES"
        - "other"
      examples:
        - "IUPAC SMILES+"
        - "OpenSMILES"
      x-optimade-unit: "inapplicable"
    _cheminfo_specification_name_other:
      description: |-
        A name of the specification the given SMILES string conforms to, if different from the enumerator values for metadata property '_cheminfo_specification_name'.
        MUST be defined (non-NULL) if and only if the value for '_cheminfo_specification_name' is known and is equal to 'other'.
      x-optimade-type: "string"
      type:
        - "string"
        - "null"
      examples:
        - "Daylight"
        - "OpenBabel"
      x-optimade-unit: "inapplicable"
    _cheminfo_specification_version:
      description: |-
        The version of the SMILES specification given in metadata property '_cheminfo_specification_name'.
        If '_cheminfo_specification_name_other' contains the name of a software library used to generate SMILES, '_cheminfo_specification_version' MUST be the version of this software library.
      x-optimade-type: "string"
      type:
        - "string"
        - "null"
      examples:
        - "1.0"
        - "a76e26b32e6f0d18f7dd0cadf1b23449baebb04e"
      x-optimade-unit: "inapplicable"
    _cheminfo_special_details:
      description: |-
        Other details related to SMILES treatment by the provider that might need relaying.
        For example, a provider might want to express that stereochemistry is not represented in this SMILES string.
      x-optimade-type: "string"
      type:
        - "string"
        - "null"
      examples:
        - "Stereochemistry is not represented"
      x-optimade-unit: "inapplicable"
  x-optimade-unit: "inapplicable"
x-optimade-unit: "inapplicable"
items:
  type:
    - "string"
  x-optimade-type: "string"
  x-optimade-unit: "inapplicable"
